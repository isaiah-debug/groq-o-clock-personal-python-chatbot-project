name: integration-test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run command line integration test
        run: |
          mkdir -p itest
          printf 'DocChat docs\nneedle line\n' > itest/sample.txt
          output="$(printf '/calculate 2 + 3\n/ls itest\n/cat itest/sample.txt\n/grep needle itest/*.txt\n' | chat)"
          echo "$output"
          echo "$output" | grep 'chat> 5'
          echo "$output" | grep 'sample.txt'
          echo "$output" | grep 'DocChat docs'
          echo "$output" | grep 'needle line'
